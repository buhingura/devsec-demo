{% extends 'idan_muteruz/base.html' %}

{% block title %}Password updated{% endblock %}

{% block auth_card %}
<div class="auth-card">
    <div class="auth-card-head">
        <div class="auth-brand">dan<span></span></div>
        <div class="auth-brand-sub">Security Dashboard</div>
    </div>

    <div class="auth-card-body">
        <!-- Success icon -->
        <div style="width:48px; height:48px; background:var(--success-bg);
                    border-radius:50%; display:flex; align-items:center;
                    justify-content:center; margin-bottom:1rem;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke-width="2" stroke="#059669" style="width:24px;height:24px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
            </svg>
        </div>

        <h1>Password updated</h1>
        <p class="auth-subtitle">
            Your password has been set successfully.
            Sign in below to access your account.
        </p>

        <div style="margin-top:1.5rem;">
            <a href="{% url 'idan_muteruz:login' %}" class="btn btn-primary btn-full">
                Sign in
            </a>
        </div>
    </div>
</div>
{% endblock %}
