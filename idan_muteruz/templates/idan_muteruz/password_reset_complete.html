{% extends 'idan_muteruz/base.html' %}

{% block title %}Password reset complete{% endblock %}

{% block auth_card %}
<div class="auth-card">
    <div class="auth-card-head">
        <div class="auth-brand">dan</div>
        <div class="auth-brand-sub">Security Dashboard</div>
    </div>

    <div class="auth-card-body">
        <h1>Password updated</h1>
        <p class="auth-subtitle">
            Your password has been set. You can now sign in with your new password.
        </p>
        <div style="margin-top:1.25rem;">
            <a href="{% url 'idan_muteruz:login' %}" class="btn btn-primary btn-full">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
